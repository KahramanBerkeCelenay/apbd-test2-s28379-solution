services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: apbd-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Test2_StrongPass123"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

volumes:
  mssql-data:
